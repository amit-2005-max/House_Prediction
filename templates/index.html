<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 6px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 5px #fff;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 95%;
            border: none;
            border-radius: 8px;
            background: #00ffcc;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00ccaa;
            transform: scale(1.05);
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>House Price Predictor</h2>

    <form action="/predict" method="post">
        <input name="area" placeholder="Area"><br>
        <input name="bedrooms" placeholder="Bedrooms"><br>
        <input name="bathrooms" placeholder="Bathrooms"><br>
        <input name="floors" placeholder="Floors"><br>
        <input name="parking" placeholder="Parking"><br>
        <input name="location_score" placeholder="Location Score"><br>
        <input name="nearby_hospitals" placeholder="Nearby Hospitals"><br>
        <input name="furnished" placeholder="Furnished (0/1)"><br>
        <input name="material_quality" placeholder="Material Quality (1-10)"><br>
        <input name="location_type" placeholder="0=Village, 1=City"><br>

        <button type="submit">Predict Price</button>
    </form>

    <div class="result">
        {{ prediction_text }}
    </div>
</div>

</body>
</html>
